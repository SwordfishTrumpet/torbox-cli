repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-python-dateutil]
        args: [--strict, torbox]

  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest-quick
        entry: pytest -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
